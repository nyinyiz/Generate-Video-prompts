name: Update prompts

on:
  schedule:
    # 06:00 AM Asia/Bangkok (UTC+7)
    - cron: "0 23 * * *"
    # 12:00 PM Asia/Bangkok (UTC+7)
    - cron: "0 5 * * *"
    # 06:00 PM Asia/Bangkok (UTC+7)
    - cron: "0 11 * * *"
    # 12:00 AM Asia/Bangkok (UTC+7)
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-prompts
  cancel-in-progress: false

jobs:
  update-prompts:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Bangkok

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run generator
        run: npm run generate

      - name: Detect prompt dataset changes
        id: changes
        run: |
          if git diff --quiet --exit-code -- data/prompts.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated prompt dataset
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prompts.json
          git commit -m "chore: update generated prompts [skip ci]"

      - name: Push changes
        if: steps.changes.outputs.changed == 'true'
        run: git push origin HEAD:main
